name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      # Static site: stage only the app files (exclude dev/research material).
      - name: Stage static site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' --exclude='.github' --exclude='node_modules' \
            --exclude='_site' --exclude='dist' --exclude='data' \
            --exclude='paper' --exclude='journal' --exclude='docs' \
            --exclude='tools' --exclude='supabase' --exclude='tests' \
            --exclude='*.md' --exclude='package*.json' --exclude='vite.config.*' \
            ./ _site/
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
