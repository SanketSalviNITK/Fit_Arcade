<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jump Cleaner</title>
</head>
<body style="background: #1e1e24; color: white; font-family: sans-serif; text-align: center; padding-top: 50px;">
    <h2>AI Jump Background Remover</h2>
    <p>Click below to remove the white background from your new jump animation!</p>
    
    <button id="processBtn" disabled style="padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #00ffcc; border: none; border-radius: 5px; font-weight: bold;">
        Loading jump image...
    </button>
    
    <br><br>
    <canvas id="canvas" style="border: 2px dashed #444; width: 512px; height: 512px; background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAAXNSR0IArs4c6QAAACVJREFUKFNjZCASMDKgAhgZ/v//z4QlzcDAwMCILs+ER4FQCggBAKk4BQAQnL9AAAAAAElFTkSuQmCC');"></canvas>
    
    <script>
        const img = new Image();
        img.onload = () => {
            const btn = document.getElementById('processBtn');
            btn.disabled = false;
            btn.innerText = "Clean Background & Download";
        };
        img.src = 'jump_raw.png';

        document.getElementById('processBtn').addEventListener('click', () => {
            const canvas = document.getElementById('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            
            ctx.drawImage(img, 0, 0, img.width, img.height);
            
            const imgData = ctx.getImageData(0, 0, img.width, img.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                if (data[i] > 230 && data[i+1] > 230 && data[i+2] > 230) {
                    data[i+3] = 0; // Transparent
                }
            }
            ctx.putImageData(imgData, 0, 0);

            const link = document.createElement('a');
            link.download = 'my_jump.png'; 
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            document.getElementById('processBtn').innerText = "Downloaded!";
        });
    </script>
</body>
</html>
