<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaboom.js Endless Runner Demo</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #2b2b36; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            flex-direction: column;
            color: white;
            font-family: monospace;
        }
        canvas { 
            box-shadow: 0 0 30px rgba(0,255,200,0.2); 
            border-radius: 8px; 
            border: 4px solid #fff;
        }
        h2 { margin-bottom: 5px; }
    </style>
</head>
<body>
    <div>
        <h2>Kaboom.js Runner</h2>
        <p>Press <strong>SPACE</strong> or <strong>CLICK</strong> to jump. Notice how much shorter the code is compared to Phaser!</p>
    </div>
    
    <!-- Kaboom Script -->
    <script type="module">
        // 1. Import the latest Kaboom version (v3000)
        import kaboom from "https://unpkg.com/kaboom@3000.1.17/dist/kaboom.mjs";

        // 2. Initialize the game context
        kaboom({
            width: 800,
            height: 400,
            background: [ 30, 30, 45 ], // RGB background color
        });

        // Kaboom has built-in sprite assets for quick prototyping! 
        // "Bean" is the official mascot.
        loadBean(); 

        // Set global physics gravity
        setGravity(2400);

        // --- MAIN GAME SCENE ---
        scene("game", () => {
            let score = 0;
            let gameSpeed = 400;

            // Add the Ground
            // Kaboom uses a "Component" system. You pass an array of properties to add()
            add([
                rect(width(), 48),        // Shape and size
                pos(0, height() - 48),    // Position on screen
                outline(4),               // Draw an outline around it
                area(),                   // Gives it a collision hitbox
                body({ isStatic: true }), // Makes it a solid physics object that doesn't fall
                color(30, 200, 150),      // RGB Color
            ]);

            // Add the Player
            const player = add([
                sprite("bean"),           // Render as the Bean sprite
                pos(100, 200),            
                area(),                   // Hitbox
                body(),                   // Physics (so gravity pulls it down)
            ]);

            // Jump Action
            function jump() {
                // isGrounded() is provided by the body() component
                if (player.isGrounded()) {
                    player.jump(800);
                }
            }
            onKeyPress("space", jump);
            onClick(jump);

            // Spawn Obstacles Function
            function spawnObstacle() {
                add([
                    // Random height between 32 and 96
                    rect(48, rand(32, 96)), 
                    area(),
                    outline(4),
                    pos(width(), height() - 48),
                    anchor("botleft"),     // Draw from the bottom-left so it rests perfectly on the ground
                    color(255, 50, 100),
                    move(LEFT, gameSpeed), // Automatically moves left every frame!
                    "obstacle",            // A tag we use later for collision detection
                ]);
                
                // Wait a random time between 0.8 and 1.5 seconds, then call itself again
                wait(rand(0.8, 1.5), spawnObstacle);
            }
            
            // Start the spawning loop
            spawnObstacle();

            // Handle Collision
            // When anything with the player hits anything with the "obstacle" tag:
            player.onCollide("obstacle", () => {
                shake(15); // Built-in screen shake!
                
                // Switch to the 'lose' scene and pass the final score
                go("lose", Math.floor(score)); 
            });

            // UI Score Text
            const scoreLabel = add([
                text(score, { size: 24 }),
                pos(24, 24),
                color(255, 255, 255)
            ]);

            // Run this code every single frame
            onUpdate(() => {
                score += dt() * 10; // dt() is the time since last frame
                gameSpeed += dt() * 5; // slowly increase speed
                scoreLabel.text = "SCORE: " + Math.floor(score);
            });
        });

        // --- GAME OVER SCENE ---
        scene("lose", (finalScore) => {
            add([
                text("GAME OVER\n\nScore: " + finalScore + "\n\nPress Space to Restart", { 
                    size: 48, 
                    align: "center" 
                }),
                pos(width() / 2, height() / 2),
                anchor("center"),
                color(255, 50, 100)
            ]);

            onKeyPress("space", () => {
                go("game"); // Go back to the game scene
            });
            onClick(() => go("game"));
        });

        // Start by running the "game" scene
        go("game");

    </script>
</body>
</html>
