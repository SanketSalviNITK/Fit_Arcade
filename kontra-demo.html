<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontra.js Endless Runner Demo</title>
    <!-- Import Kontra.js v10 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/kontra/10.0.2/kontra.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e1e24;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            background-color: #111;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
            border: 4px solid #444;
            /* Ensure crisp pixels */
            image-rendering: pixelated; 
        }
        #info {
            text-align: center;
            margin-bottom: 20px;
        }
        h2 { margin: 0 0 10px 0; color: #ffcc00; }
        p { margin: 0; }
    </style>
</head>
<body>
    <div id="info">
        <h2>Kontra.js Runner (Micro-Library)</h2>
        <p>Press <strong>SPACE</strong> to jump. Notice how we write manual physics logic here!</p>
    </div>
    
    <!-- Kontra requires an explicit canvas element -->
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script>
        // Use an event listener to ensure everything is fully loaded
        window.onload = function() {
            // 1. Destructure the features we need from the global `kontra` object
            let { init, Sprite, GameLoop, initKeys, keyPressed, collides } = kontra;

            // 2. Initialize the engine on our canvas
            let { canvas, context } = init('gameCanvas');
            
            // 3. Initialize keyboard input
            initKeys();

            // Game State Variables
            let gameSpeed = 6;
            let score = 0;
            let gameOver = false;
            let spawnTimer = 0;
            let obstacles = [];

            // --- THE GROUND ---
            let ground = Sprite({
                x: 0, 
                y: 352,
                width: 800, 
                height: 48,
                color: '#333344'
            });

            // --- THE PLAYER ---
            let player = Sprite({
                x: 100, 
                y: 300,
                width: 32, 
                height: 32,
                color: '#00ffcc',
                
                // Custom properties for manual physics
                dy: 0, 
                gravity: 0.8,
                jumpPower: -15,

                // The update function runs every frame for this sprite
                update: function() {
                    // Apply manual gravity
                    this.dy += this.gravity;
                    this.y += this.dy;
                    
                    // Manual Ground Collision
                    if (this.y >= 352 - this.height) {
                        this.y = 352 - this.height; // Snap to ground
                        this.dy = 0;                // Stop falling
                    }
                    
                    // Manual Jump Logic (Only jump if touching the ground)
                    if (keyPressed('space') && this.y === 352 - this.height) {
                        this.dy = this.jumpPower;
                    }
                }
            });

            // --- THE GAME LOOP ---
            let loop = GameLoop({
                // Update runs 60 times a second to update game logic
                update: function() {
                    if (gameOver) {
                        // Restart Logic
                        if (keyPressed('space')) {
                            gameOver = false;
                            obstacles = [];
                            score = 0;
                            player.y = 300;
                            player.color = '#00ffcc';
                            gameSpeed = 6;
                        }
                        return; // Stop updating the game if we are dead
                    }

                    // Update the player
                    player.update();
                    
                    // Increase score and speed
                    score += 1;
                    if (score % 500 === 0) gameSpeed += 0.5;

                    // Handle Obstacle Spawning manually
                    spawnTimer++;
                    if (spawnTimer > 70) { 
                        obstacles.push(Sprite({
                            x: 800,
                            y: 352 - 48,
                            width: 32,
                            height: 48,
                            color: '#ff3366',
                            dx: -gameSpeed // Move left constantly
                        }));
                        
                        // Reset timer with some randomness
                        spawnTimer = -Math.floor(Math.random() * 40);
                    }

                    // Update obstacles and check collisions
                    obstacles.forEach(obs => {
                        obs.update();
                        
                        // Kontra provides a simple AABB collision checker
                        if (collides(player, obs)) {
                            gameOver = true;
                            player.color = 'red';
                        }
                    });
                    
                    // Clean up obstacles that went off screen
                    obstacles = obstacles.filter(obs => obs.x > -50);
                },

                // Render runs 60 times a second to draw things to the canvas
                render: function() {
                    // Draw sprites
                    ground.render();
                    player.render();
                    obstacles.forEach(obs => obs.render());
                    
                    // Draw Score using native HTML5 Canvas API
                    context.fillStyle = 'white';
                    context.font = 'bold 24px Courier';
                    context.fillText('SCORE: ' + Math.floor(score/10), 20, 40);
                    
                    // Draw Game Over Screen
                    if (gameOver) {
                        context.fillStyle = '#ff3366';
                        context.font = 'bold 48px Courier';
                        context.fillText('GAME OVER', 270, 180);
                        
                        context.fillStyle = 'white';
                        context.font = '24px Courier';
                        context.fillText('Press SPACE to restart', 240, 230);
                    }
                }
            });

            // 4. Start the game!
            loop.start();
        };
    </script>
</body>
</html>
