<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk 8-Bit Runner</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { overflow: hidden; margin: 0; padding: 0; width: 100%; height: 100%; 
            margin: 0;
            padding: 0;
            background-color: #05050f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            image-rendering: pixelated; 
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.4);
            border: 4px solid #ff00ff;
            border-radius: 4px;
        }
        #info {
            position: absolute;
            top: 20px;
            text-align: center;
            text-shadow: 2px 2px 0 #ff00ff;
        }
        h2 { color: #00ffcc; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #fff; text-shadow: none; margin-top: 0; }
    </style>
</head>
<body>
    
    <script>
        class PlayScene extends Phaser.Scene {
            constructor() {
                super({ key: 'PlayScene' });
            }

            preload() {
                // --- LOAD EXTERNAL ASSETS ---
                // This will attempt to load the image you provided if you save it as 'player.png'
                // Note: Loading local files requires a web server to avoid CORS errors.
                this.load.image('player_image', 'player.png');
                
                // --- GENERATE CYBERPUNK ASSETS ---
                let graphics = this.make.graphics({x: 0, y: 0, add: false});
                
                // Fallback Player (Cyan/Magenta neon block in case image isn't found)
                graphics.fillStyle(0x00ffcc, 1);
                graphics.fillRect(0, 0, 32, 32);
                graphics.fillStyle(0xff00ff, 1);
                graphics.fillRect(8, 8, 16, 16);
                graphics.generateTexture('fallback_player', 32, 32);
                
                // Obstacle (Neon Laser Barrier)
                graphics.clear();
                graphics.fillStyle(0xff00ff, 0.4);
                graphics.fillRect(0, 0, 32, 64);
                graphics.fillStyle(0xff0055, 1); // Bright red-pink core
                graphics.fillRect(12, 0, 8, 64);
                graphics.generateTexture('obstacle', 32, 64);

                // Ground (Cyberpunk Road)
                graphics.clear();
                graphics.fillStyle(0x0a0a1a, 1);
                graphics.fillRect(0, 0, 800, 32);
                graphics.fillStyle(0xff00ff, 1); // Neon top line
                graphics.fillRect(0, 0, 800, 4);
                // Grid lines
                for(let i=0; i<800; i+=32) {
                    graphics.fillStyle(0x00ffcc, 0.3);
                    graphics.fillRect(i, 4, 2, 28);
                }
                graphics.generateTexture('ground', 800, 32);

                // Particles (Neon sparks)
                graphics.clear();
                graphics.fillStyle(0x00ffcc, 1);
                graphics.fillRect(0, 0, 4, 4);
                graphics.generateTexture('spark_cyan', 4, 4);

                // Background (Distant Cyberpunk City Silhouette)
                graphics.clear();
                graphics.fillStyle(0x110022, 1);
                // Draw some random buildings
                for(let i=0; i<800; i+=40) {
                    let h = 50 + Math.random() * 150;
                    graphics.fillRect(i, 400 - h, 35, h);
                    
                    // Add some neon window lights
                    if (Math.random() > 0.5) {
                        graphics.fillStyle(0x00ffcc, 0.5);
                        graphics.fillRect(i + 10, 400 - h + 20, 4, 4);
                        graphics.fillStyle(0x110022, 1); // Reset
                    }
                }
                graphics.generateTexture('city_bg', 800, 400);

                // Grid background layer
                graphics.clear();
                graphics.lineStyle(1, 0xff00ff, 0.1);
                for(let i=0; i<800; i+=40) {
                    graphics.moveTo(i, 0);
                    graphics.lineTo(i, 400);
                }
                for(let j=0; j<400; j+=40) {
                    graphics.moveTo(0, j);
                    graphics.lineTo(800, j);
                }
                graphics.strokePath();
                graphics.generateTexture('grid_bg', 800, 400);
            }

            create() {
                this.score = 0;
                this.gameOver = false;
                this.gameSpeed = 450;

                // Parallax Backgrounds
                this.add.rectangle(400, 200, 800, 400, 0x05050f); // Deep dark blue/black base
                this.bgGrid = this.add.tileSprite(400, 200, 800, 400, 'grid_bg');
                this.bgCity = this.add.tileSprite(400, 200, 800, 400, 'city_bg');
                this.bgCity.setAlpha(0.6);

                // Ground
                this.ground = this.physics.add.staticImage(400, 384, 'ground');

                // Particle Emitter (Neon Sparks)
                this.particles = this.add.particles('spark_cyan');
                this.dustTrail = this.particles.createEmitter({
                    x: 100,
                    y: 320,
                    speed: { min: -150, max: -50 },
                    angle: { min: 140, max: 220 },
                    scale: { start: 1, end: 0 },
                    alpha: { start: 1, end: 0 },
                    lifespan: 600,
                    gravityY: 100,
                    frequency: 30,
                    blendMode: 'ADD' // Glowing neon look
                });

                // --- PLAYER SETUP ---
                // Use the loaded image if it worked, otherwise use the fallback block
                let playerTexture = this.textures.exists('player_image') ? 'player_image' : 'fallback_player';
                this.player = this.physics.add.sprite(100, 300, playerTexture);
                
                // Scale the image down nicely so it fits the game world (targeting ~64px tall)
                let scaleRatio = 64 / this.player.height;
                if (scaleRatio < 1 || this.player.height > 64) {
                    this.player.setScale(scaleRatio);
                }
                // Adjust hitbox tightly to the scaled character
                this.player.body.setSize(this.player.width * 0.6, this.player.height * 0.8);

                this.player.setGravityY(2000); 
                this.player.setCollideWorldBounds(true);
                this.physics.add.collider(this.player, this.ground);
                
                // Adjust particles to come from the feet
                let pOffset = this.player.displayHeight / 2;
                this.dustTrail.startFollow(this.player, -this.player.displayWidth/4, pOffset - 5);

                // Obstacles
                this.obstacles = this.physics.add.group();
                this.physics.add.collider(this.obstacles, this.ground);
                this.physics.add.overlap(this.player, this.obstacles, this.hitObstacle, null, this);

                // Inputs
                this.input.on('pointerdown', this.jump, this);
                this.spaceBar = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

                // UI
                this.scoreText = this.add.text(16, 16, 'DATA: 0 TB', { 
                    fontSize: '24px', fill: '#00ffcc', fontStyle: 'bold', fontFamily: '"Courier New", Courier, monospace'
                });
                this.scoreText.setShadow(0, 0, '#00ffcc', 4); // Neon glow
                
                this.gameOverText = this.add.text(400, 200, 'SYSTEM FAILURE\nSpace to Reboot', { 
                    fontSize: '48px', fill: '#ff00ff', fontStyle: 'bold', align: 'center', fontFamily: '"Courier New", Courier, monospace'
                }).setOrigin(0.5);
                this.gameOverText.setShadow(0, 0, '#ff00ff', 10);
                this.gameOverText.setVisible(false);

                // Spawn Timer
                this.spawnTimer = this.time.addEvent({
                    delay: 1000,
                    callback: this.spawnObstacle,
                    callbackScope: this,
                    loop: true
                });
            }

            jump() {
                if (this.gameOver) {
                    this.scene.restart();
                    return;
                }
                if (this.player.body.touching.down) {
                    this.player.setVelocityY(-800);
                    this.dustTrail.stop();
                }
            }

            spawnObstacle() {
                if (this.gameOver) return;
                
                let obstacle = this.obstacles.create(800, 336, 'obstacle');
                obstacle.setVelocityX(-this.gameSpeed);
                obstacle.setImmovable(true);
                obstacle.body.allowGravity = false;
                obstacle.setBlendMode('ADD'); // Neon glowing laser effect
            }

            hitObstacle(player, obstacle) {
                this.physics.pause();
                this.cameras.main.shake(300, 0.03);
                player.setTint(0xff0000);
                this.gameOver = true;
                this.gameOverText.setVisible(true);
                this.spawnTimer.remove();
                this.dustTrail.stop();
            }

            update(time, delta) {
                if (this.gameOver) {
                    if (Phaser.Input.Keyboard.JustDown(this.spaceBar)) {
                        this.scene.restart();
                    }
                    return;
                }

                if (Phaser.Input.Keyboard.JustDown(this.spaceBar)) {
                    this.jump();
                }

                if (this.player.body.touching.down && !this.dustTrail.on) {
                    this.dustTrail.start();
                }

                this.score += delta * 0.02;
                this.scoreText.setText('DATA: ' + Math.floor(this.score) + ' TB');
                this.gameSpeed += delta * 0.01;
                
                // Parallax Scrolling
                this.bgCity.tilePositionX += (this.gameSpeed * delta * 0.00015);
                this.bgGrid.tilePositionX += (this.gameSpeed * delta * 0.00005);
                
                this.obstacles.getChildren().forEach(function(obstacle) {
                    if (obstacle.x < -50) {
                        obstacle.destroy();
                    }
                });
            }
        }

        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 400,
            pixelArt: true,
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 0 }, debug: false }
            },
            scene: [PlayScene]
        };

        const game = new Phaser.Game(config);
    </script>
</body>
</html>
