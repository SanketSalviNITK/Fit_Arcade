<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Sprite Standardizer</title>
</head>
<body style="background: #1e1e24; color: white; font-family: sans-serif; text-align: center; padding-top: 50px;">
    <h2>Ultimate Sprite Standardizer</h2>
    <p>This tool will auto-crop every single frame from your running and jumping sprite sheets, standardize their sizes, align their feet perfectly to the floor, and pack them all into a single, professional master sprite sheet.</p>
    
    <button id="processBtn" disabled style="padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #00ffcc; border: none; border-radius: 5px; font-weight: bold;">
        Loading Images...
    </button>
    
    <br><br>
    <canvas id="preview" style="border: 2px dashed #444; max-width: 90%; background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAAXNSR0IArs4c6QAAACVJREFUKFNjZCASMDKgAhgZ/v//z4QlzcDAwMCILs+ER4FQCggBAKk4BQAQnL9AAAAAAElFTkSuQmCC');"></canvas>

    <script>
        const imgRun = new Image();
        const imgJump = new Image();
        const imgSlide = new Image();
        let loadedCount = 0;

        imgRun.onload = checkLoad;
        imgJump.onload = checkLoad;
        imgSlide.onload = checkLoad;
        
        imgRun.src = 'my_character.png'; // 2x2 grid
        imgJump.src = 'my_jump.png'; // 1x4 row
        imgSlide.src = 'slide_raw.png'; // Assuming 1x4 row (the AI usually does this now)

        function checkLoad() {
            loadedCount++;
            if (loadedCount === 3) {
                document.getElementById('processBtn').disabled = false;
                document.getElementById('processBtn').innerText = "Standardize 12 Frames & Download";
            }
        }

        // Auto-crops empty transparent space
        function getBoundingBox(ctx, width, height) {
            const data = ctx.getImageData(0, 0, width, height).data;
            let minX = width, minY = height, maxX = 0, maxY = 0;
            let found = false;
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const alpha = data[(y * width + x) * 4 + 3];
                    if (alpha > 10) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                        found = true;
                    }
                }
            }
            if (!found) return null;
            return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
        }

        function extractFrame(img, sx, sy, sw, sh) {
            const c = document.createElement('canvas');
            c.width = sw; c.height = sh;
            const ctx = c.getContext('2d');
            ctx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
            
            // Clean up any stray background colors from the AI
            const imgData = ctx.getImageData(0, 0, sw, sh);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                if (data[i] > 230 && data[i+1] > 230 && data[i+2] > 230) {
                    data[i+3] = 0; // Transparent
                }
            }
            ctx.putImageData(imgData, 0, 0);

            const box = getBoundingBox(ctx, sw, sh);
            if (!box) return null;

            const cropped = document.createElement('canvas');
            cropped.width = box.w; cropped.height = box.h;
            cropped.getContext('2d').drawImage(c, box.x, box.y, box.w, box.h, 0, 0, box.w, box.h);
            return cropped;
        }

        document.getElementById('processBtn').addEventListener('click', () => {
            const frames = [];

            // 1. Run frames (2x2)
            frames.push(extractFrame(imgRun, 0, 0, 512, 512));
            frames.push(extractFrame(imgRun, 512, 0, 512, 512));
            frames.push(extractFrame(imgRun, 0, 512, 512, 512));
            frames.push(extractFrame(imgRun, 512, 512, 512, 512));

            // 2. Jump frames (1x4)
            frames.push(extractFrame(imgJump, 0, 0, 256, 1024));
            frames.push(extractFrame(imgJump, 256, 0, 256, 1024));
            frames.push(extractFrame(imgJump, 512, 0, 256, 1024));
            frames.push(extractFrame(imgJump, 768, 0, 256, 1024));

            // 3. Slide frames (2x2 grid, just like the run animation!)
            frames.push(extractFrame(imgSlide, 0, 0, 512, 512));
            frames.push(extractFrame(imgSlide, 512, 0, 512, 512));
            frames.push(extractFrame(imgSlide, 0, 512, 512, 512));
            frames.push(extractFrame(imgSlide, 512, 512, 512, 512));

            // Find unified max frame dimensions
            let maxW = 0, maxH = 0;
            frames.forEach(f => {
                if (f) {
                    if (f.width > maxW) maxW = f.width;
                    if (f.height > maxH) maxH = f.height;
                }
            });

            // Add 10px padding so nothing gets cut off
            maxW += 20;
            maxH += 20;

            // 12 frames horizontally
            const master = document.getElementById('preview');
            master.width = maxW * 12;
            master.height = maxH;
            const ctx = master.getContext('2d');

            frames.forEach((f, i) => {
                if (f) {
                    // Center horizontally in the cell
                    const dx = (i * maxW) + (maxW / 2) - (f.width / 2);
                    // BOTTOM ALIGN vertically! This ensures feet hit the ground consistently.
                    const dy = maxH - f.height - 10;
                    ctx.drawImage(f, dx, dy);
                }
            });

            // Download
            const link = document.createElement('a');
            link.download = 'master_sprite.png';
            link.href = master.toDataURL('image/png');
            link.click();
            
            document.getElementById('processBtn').innerText = "Downloaded master_sprite.png!";
        });
    </script>
</body>
</html>
