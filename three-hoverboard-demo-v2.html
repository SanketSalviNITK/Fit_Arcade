<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hoverboard Alley 3D (Asset Integration)</title>
    <!-- Lightweight real-3D build. UMD three (global THREE) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/shaders/CopyShader.js"></script>
    <link rel="stylesheet" href="css/game-frame.css">
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { 
            image-rendering: pixelated !important; 
            width: 100vw !important; 
            height: 100vh !important; 
        }
        #hit-flash { position: fixed; inset: 0; background: #ff2b2b; opacity: 0; pointer-events: none; z-index: 5; transition: opacity 0.08s ease-out; }
        #loading { position: fixed; inset: 0; background: #070510; color: #00ffff; display: flex; align-items: center; justify-content: center; font-family: monospace; font-size: 24px; z-index: 10; }
    </style>
    <script>
        window.MOTION_MAP = {
            leanLeft:  { type: 'tap', code: 'ArrowLeft',  keyCode: 37, key: 'ArrowLeft' },
            leanRight: { type: 'tap', code: 'ArrowRight', keyCode: 39, key: 'ArrowRight' }
        };
    </script>
    <script src="js/motion-bridge.js"></script>
    <script src="js/coach.js"></script>
</head>
<body>
    <div id="loading">Loading 3D Assets (0%)...</div>
    <div id="hit-flash"></div>
    <script>
    (function () {
        // ============================ WORLD TUNING ============================
        const LANES = [-2, 0, 2];
        const PLAYER_Z = 0;
        const SPAWN_Z = -78;
        const RECYCLE_Z = 9;
        const BASE_SPEED = 20;
        const OB_POOL = 24, ORB_POOL = 12, PILLARS = 32, RUNGS = 24;

        // ============================ ASSET LOADING ============================
        const modelUrls = {
            path: '3d_assets/Path Straight.glb',
            buildings: [
                '3d_assets/Apartment building.glb', '3d_assets/Bakery.glb', '3d_assets/Big Building.glb',
                '3d_assets/Building (1).glb', '3d_assets/Building Red.glb', '3d_assets/Building.glb',
                '3d_assets/Large Building.glb', '3d_assets/Small Building (1).glb', '3d_assets/Small Building (2).glb',
                '3d_assets/Small Building.glb'
            ],
            obstacles: [
                '3d_assets/Cart.glb', '3d_assets/Dumpster.glb', '3d_assets/Market Stand.glb', '3d_assets/Sci Fi Engine.glb'
            ]
        };

        const models = { buildings: [], obstacles: [] };
        
        const manager = new THREE.LoadingManager();
        manager.onProgress = function ( url, itemsLoaded, itemsTotal ) {
            document.getElementById('loading').innerText = `Loading 3D Assets (${Math.round((itemsLoaded/itemsTotal)*100)}%)...`;
        };
        manager.onError = function (url) {
            console.error('Error loading', url);
            document.getElementById('loading').innerText = `Error loading: ${url}\n(If running locally, this is likely a CORS issue. Use a local web server.)`;
            document.getElementById('loading').style.color = 'red';
            document.getElementById('loading').style.fontSize = '16px';
            document.getElementById('loading').style.textAlign = 'center';
            document.getElementById('loading').style.padding = '20px';
        };
        manager.onLoad = function () {
            document.getElementById('loading').style.display = 'none';
            initGame();
        };

        const loader = new THREE.GLTFLoader(manager);
        const texLoader = new THREE.TextureLoader(manager);
        
        models.texIdle = texLoader.load('hover_idle.png');
        models.texIdle.repeat.set(0.5, 0.5); // 2x2 grid
        
        models.texLeft = texLoader.load('hover_left.png');
        models.texLeft.repeat.set(0.5, 0.5); // 2x2 grid
        
        models.texRight = texLoader.load('hover_right.png');
        models.texRight.repeat.set(0.5, 0.5); // 2x2 grid
        
        // Helper to center and scale a model to a target max dimension
        function prepModel(gltf, targetSize, isBuilding = false) {
            const scene = gltf.scene;
            // Traverse to enable shadows or fix materials if needed
            scene.traverse((child) => {
                if (child.isMesh) {
                    // enhance material colors for the night scene
                    if (child.material) {
                        child.material.metalness = 0.3;
                        child.material.roughness = 0.7;
                    }
                }
            });

            const box = new THREE.Box3().setFromObject(scene);
            const size = new THREE.Vector3();
            box.getSize(size);
            
            // For buildings, we care about the width/depth to fit next to the street
            const maxDim = isBuilding ? Math.max(size.x, size.z) : Math.max(size.x, size.y, size.z);
            const scale = targetSize / maxDim;
            scene.scale.setScalar(scale);

            // Recompute bounding box after scale
            const scaledBox = new THREE.Box3().setFromObject(scene);
            const center = new THREE.Vector3();
            scaledBox.getCenter(center);
            
            // Shift geometry to center
            scene.position.x += (scene.position.x - center.x);
            // Place on the floor (Y = 0 at the bottom)
            scene.position.y += (scene.position.y - scaledBox.min.y);
            scene.position.z += (scene.position.z - center.z);
            
            return scene;
        }

        loader.load(modelUrls.path, gltf => { 
            models.path = prepModel(gltf, 6.2); // make the path piece wide enough for 3 lanes
            models.path.position.y = 0; // flush with floor
        });

        modelUrls.buildings.forEach(url => {
            loader.load(url, gltf => { models.buildings.push(prepModel(gltf, 4, true)); });
        });

        modelUrls.obstacles.forEach(url => {
            loader.load(url, gltf => { models.obstacles.push(prepModel(gltf, 1.5)); });
        });

        // ============================ GAME LOGIC ============================
        function initGame() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x070510);
            scene.fog = new THREE.Fog(0x070510, 18, 74);

            const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 220);
            camera.position.set(0, 3.4, 6.6);
            camera.lookAt(0, 0.8, -14);

            const PIXEL_SCALE = 2; // Reduced pixelation by 50% for a cleaner GBA/SNES look
            const renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setPixelRatio(1);
            renderer.setSize(window.innerWidth / PIXEL_SCALE, window.innerHeight / PIXEL_SCALE, false);
            document.body.appendChild(renderer.domElement);

            // POST PROCESSING (16-bit Color Quantization)
            const composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));
            
            const ColorBandShader = {
                uniforms: {
                    "tDiffuse": { value: null },
                    "colorLevels": { value: 32.0 } // 32 levels = authentic 16-bit color depth (RGB565)
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform sampler2D tDiffuse;
                    uniform float colorLevels;
                    varying vec2 vUv;
                    void main() {
                        vec4 color = texture2D(tDiffuse, vUv);
                        color.rgb = floor(color.rgb * colorLevels) / colorLevels;
                        gl_FragColor = color;
                    }
                `
            };
            const colorBandPass = new THREE.ShaderPass(ColorBandShader);
            composer.addPass(colorBandPass);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2)); // Increased ambient light for neon glow
            const dir = new THREE.DirectionalLight(0xffffff, 1.0); // Stronger directional light
            dir.position.set(4, 10, 6);
            scene.add(dir);
            
            // Add a vibrant neon point light near the player
            const neonLight = new THREE.PointLight(0x00f0ff, 2.5, 30);
            neonLight.position.set(0, 2, 0);
            scene.add(neonLight);

            // Scale the entire scene by 20%
            scene.scale.set(1.2, 1.2, 1.2);

            // ---- floor + static neon lane rails ----
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(16, 260),
                new THREE.MeshStandardMaterial({ color: 0x0a0a18, roughness: 0.9, metalness: 0.1 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.position.z = -100;
            scene.add(floor);

            [-3, -1, 1, 3].forEach(x => {
                const rail = new THREE.Mesh(
                    new THREE.BoxGeometry(0.06, 0.02, 260),
                    new THREE.MeshBasicMaterial({ color: 0x00e0ff })
                );
                rail.position.set(x, 0.02, -100);
                scene.add(rail);
            });

            // Player Setup (2.5D Sprite)
            const playerMat = new THREE.SpriteMaterial({ map: models.texIdle, transparent: true });
            const player = new THREE.Sprite(playerMat);
            player.scale.set(1.4, 1.4, 1);
            player.position.set(LANES[1], 0.8, PLAYER_Z);
            scene.add(player);
            let playerX = LANES[1], targetLane = 1, currentLane = 1;

            // ---- scrolling floor rungs (replaced with Path Straight instances) ----
            const rungs = [];
            const rungSpan = RECYCLE_Z - SPAWN_Z;
            for (let i = 0; i < RUNGS; i++) {
                const r = models.path.clone();
                r.position.set(0, 0.02, SPAWN_Z + (i / RUNGS) * rungSpan);
                scene.add(r); rungs.push(r);
            }

            // ---- side pillars (replaced with Buildings) ----
            const pillars = [];
            for (let i = 0; i < PILLARS; i++) {
                const side = (i % 2 === 0) ? -4.5 : 4.5;
                const bModel = models.buildings[Math.floor(Math.random() * models.buildings.length)];
                const p = bModel.clone();
                p.position.set(side, 0, SPAWN_Z + (i / PILLARS) * rungSpan);
                if (side > 0) p.rotation.y = -Math.PI/2;
                else p.rotation.y = Math.PI/2;
                scene.add(p); pillars.push(p);
            }

            // ---- object pools: obstacles + orbs ----
            const obstacles = [];
            for (let i = 0; i < OB_POOL; i++) {
                const oModel = models.obstacles[Math.floor(Math.random() * models.obstacles.length)];
                const o = oModel.clone();
                o.visible = false; o.userData = { active: false, lane: 0, hit: false };
                scene.add(o); obstacles.push(o);
            }
            const orbs = [];
            for (let i = 0; i < ORB_POOL; i++) {
                const s = new THREE.Mesh(new THREE.SphereGeometry(0.42, 16, 16),
                    new THREE.MeshStandardMaterial({ color: 0xffd24a, emissive: 0xffb000, emissiveIntensity: 0.9, roughness: 0.3 }));
                s.visible = false; s.userData = { active: false, lane: 0, hit: false };
                scene.add(s); orbs.push(s);
            }

            function getFree(pool) { return pool.find(o => !o.userData.active); }

            function spawnObstacle(lane) {
                const o = getFree(obstacles); if (!o) return;
                o.userData.active = true; o.userData.lane = lane; o.userData.hit = false;
                o.visible = true; o.position.set(LANES[lane], 0, SPAWN_Z); // Rest on floor (0)
                // Randomize rotation a bit for variety
                o.rotation.y = Math.random() * Math.PI;
            }
            function spawnOrb(lane) {
                const s = getFree(orbs); if (!s) return;
                s.userData.active = true; s.userData.lane = lane; s.userData.hit = false;
                s.visible = true; s.position.set(LANES[lane], 1.0, SPAWN_Z);
            }
            function spawnWave() {
                const order = [0, 1, 2].sort(() => Math.random() - 0.5);
                const blockCount = 1 + Math.floor(Math.random() * 2);
                const blocked = order.slice(0, blockCount);
                blocked.forEach(l => spawnObstacle(l));
                const free = [0, 1, 2].filter(l => blocked.indexOf(l) === -1);
                if (free.length && Math.random() < 0.6) spawnOrb(free[Math.floor(Math.random() * free.length)]);
            }

            // ============================ INPUT ============================
            function moveLane(dir) {
                const nt = Math.max(0, Math.min(2, targetLane + dir));
                if (nt !== targetLane) targetLane = nt;
            }
            window.addEventListener('keydown', (e) => {
                if (e.code === 'ArrowLeft') moveLane(-1);
                else if (e.code === 'ArrowRight') moveLane(1);
            });
            
            // Mobile Touch Controls
            window.addEventListener('touchstart', (e) => {
                const touchX = e.touches[0].clientX;
                if (touchX < window.innerWidth / 2) moveLane(-1);
                else moveLane(1);
            }, { passive: true });

            // ============================ STATE ============================
            let score = 0, invuln = 0, shake = 0, spawnTimer = 0;

            function damage() {
                if (invuln > 0) return;
                score = Math.max(0, score - 50);
                invuln = 1.0; shake = 0.35;
                const f = document.getElementById('hit-flash');
                f.style.opacity = '0.5'; setTimeout(() => f.style.opacity = '0', 90);
            }
            function collect(orb) {
                score += 50; orb.userData.active = false; orb.visible = false;
            }

            setInterval(() => { if (window.MotionBridge) window.MotionBridge.reportScore(Math.floor(score)); }, 250);

            // ============================ LOOP ============================
            const clock = new THREE.Clock();
            function scroll(obj, dz) {
                obj.position.z += dz;
                if (obj.position.z > RECYCLE_Z) {
                    obj.position.z -= rungSpan;
                    
                    // If it's a building, maybe randomise it when recycling for variety?
                    // (We'll leave them static for now to avoid popping/geometry swaps)
                }
            }

            function animate() {
                requestAnimationFrame(animate);
                const dt = Math.min(clock.getDelta(), 0.05);
                const D = window.MOTION_DIFFICULTY || 1;
                const dz = BASE_SPEED * D * dt;

                score += dt * 10;
                if (invuln > 0) invuln -= dt;

                // ambient scroll
                rungs.forEach(r => scroll(r, dz));
                pillars.forEach(p => scroll(p, dz));

                // player lane lerp + a little banking tilt
                const deltaX = LANES[targetLane] - playerX;
                
                // Bank/Lean Texture swap logic
                if (deltaX > 0.1) {
                    player.material.map = models.texRight;
                } else if (deltaX < -0.1) {
                    player.material.map = models.texLeft;
                } else {
                    player.material.map = models.texIdle;
                }
                
                // Animate the 2x2 grid for WHICHEVER texture is active (4 frames, 8 FPS)
                const frameIndex = Math.floor(clock.elapsedTime * 8) % 4;
                const col = frameIndex % 2;
                const row = Math.floor(frameIndex / 2);
                player.material.map.offset.set(col * 0.5, 1.0 - (row + 1) * 0.5);

                playerX += deltaX * Math.min(1, 12 * dt);
                player.position.x = playerX;
                
                // Add some hover bounce
                player.position.y = 0.8 + Math.sin(clock.elapsedTime * 5) * 0.1;
                
                // Since this is a Sprite, we can use material.rotation to bank it slightly like a steering wheel
                player.material.rotation = -deltaX * 0.15;
                
                player.visible = !(invuln > 0 && Math.floor(invuln * 20) % 2 === 0);
                currentLane = Math.max(0, Math.min(2, Math.round((playerX + 2) / 2)));

                // obstacles + orbs
                for (const o of obstacles) {
                    if (!o.userData.active) continue;
                    o.position.z += dz;
                    // Coach: an obstacle is coming in the player's lane — point to a safe lane.
                    if (!o.userData.coached && o.userData.lane === currentLane && o.position.z > -22 && o.position.z < -10) {
                        o.userData.coached = true;
                        const blocked = new Set();
                        for (const q of obstacles) { if (q.userData.active && Math.abs(q.position.z - o.position.z) < 4) blocked.add(q.userData.lane); }
                        const safe = [0, 1, 2].filter(l => !blocked.has(l)).sort((a, b) => Math.abs(a - currentLane) - Math.abs(b - currentLane));
                        if (safe.length && safe[0] !== currentLane && window.Coach) {
                            window.Coach.cue(safe[0] < currentLane ? 'LEAN LEFT!' : 'LEAN RIGHT!', safe[0] < currentLane ? 'Lean left' : 'Lean right');
                        }
                    }
                    if (!o.userData.hit && o.position.z > PLAYER_Z - 0.9 && o.position.z < PLAYER_Z + 1.2 && o.userData.lane === currentLane) {
                        o.userData.hit = true; damage();
                    }
                    if (o.position.z > RECYCLE_Z) { o.userData.active = false; o.visible = false; o.userData.coached = false; }
                }
                for (const s of orbs) {
                    if (!s.userData.active) continue;
                    s.position.z += dz;
                    s.rotation.y += dt * 3;
                    if (!s.userData.hit && s.position.z > PLAYER_Z - 0.9 && s.position.z < PLAYER_Z + 1.2 && s.userData.lane === currentLane) {
                        s.userData.hit = true; collect(s);
                    }
                    if (s.position.z > RECYCLE_Z) { s.userData.active = false; s.visible = false; }
                }

                spawnTimer -= dt;
                if (spawnTimer <= 0) {
                    spawnWave();
                    // Rhythmic mode: wave cadence follows the music beat; else difficulty-scaled.
                    const R = window.MOTION_RHYTHM;
                    spawnTimer = (R && R.mode === 'rhythmic' && R.beatMs) ? (R.beatMs / 1000) : (1.5 / D); // >=1.5s so a real lean fits
                }

                if (shake > 0) { shake -= dt; camera.position.x = (Math.random() - 0.5) * shake * 1.2; }
                else camera.position.x = 0;

                composer.render();
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth / PIXEL_SCALE, window.innerHeight / PIXEL_SCALE, false);
                composer.setSize(window.innerWidth / PIXEL_SCALE, window.innerHeight / PIXEL_SCALE);
            });
        }
    })();
    </script>
</body>
</html>
