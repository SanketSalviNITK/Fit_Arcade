<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hoverboard Alley 3D (Three.js)</title>
    <!-- Lightweight real-3D build. UMD three (global THREE) so it loads like our other games. -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
    <link rel="stylesheet" href="css/game-frame.css">
    <style>
        /* 3D wants smooth sampling, not the pixel-art rule from game-frame.css */
        canvas { image-rendering: auto !important; }
        #hit-flash { position: fixed; inset: 0; background: #ff2b2b; opacity: 0; pointer-events: none; z-index: 5; transition: opacity 0.08s ease-out; }
    </style>
    <script>
        window.MOTION_MAP = {
            leanLeft:  { type: 'tap', code: 'ArrowLeft',  keyCode: 37, key: 'ArrowLeft' },
            leanRight: { type: 'tap', code: 'ArrowRight', keyCode: 39, key: 'ArrowRight' }
        };
    </script>
    <script src="js/motion-bridge.js"></script>
</head>
<body>
    <div id="hit-flash"></div>
    <script>
    (function () {
        // ============================ WORLD TUNING ============================
        const LANES = [-2, 0, 2];      // fixed X per lane (Left / Centre / Right)
        const PLAYER_Z = 0;            // player is fixed; the world flows toward +Z
        const SPAWN_Z = -78;           // far distance where geometry appears
        const RECYCLE_Z = 9;           // once past the camera, recycle
        const BASE_SPEED = 20;         // world units / second (scaled by difficulty)
        const OB_POOL = 24, ORB_POOL = 12, PILLARS = 16, RUNGS = 24;

        // ============================ SCENE SETUP ============================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x070510);
        scene.fog = new THREE.Fog(0x070510, 18, 74);   // distance fade = tunnel depth

        const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 220);
        camera.position.set(0, 3.4, 6.6);
        camera.lookAt(0, 0.8, -14);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.domElement.style.imageRendering = 'auto';
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x556688, 0.75));
        const dir = new THREE.DirectionalLight(0xffffff, 0.7);
        dir.position.set(4, 10, 6);
        scene.add(dir);

        // ---- floor + static neon lane rails ----
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(16, 260),
            new THREE.MeshStandardMaterial({ color: 0x0a0a18, roughness: 0.9, metalness: 0.1 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.position.z = -100;
        scene.add(floor);

        [-3, -1, 1, 3].forEach(x => {
            const rail = new THREE.Mesh(
                new THREE.BoxGeometry(0.06, 0.02, 260),
                new THREE.MeshBasicMaterial({ color: 0x00e0ff })
            );
            rail.position.set(x, 0.02, -100);
            scene.add(rail);
        });

        // ============================ FACTORIES ============================
        function neonBox(w, h, d, edgeColor) {
            const g = new THREE.Group();
            const geo = new THREE.BoxGeometry(w, h, d);
            const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
                color: 0x141430, roughness: 0.5, metalness: 0.25, emissive: edgeColor, emissiveIntensity: 0.14
            }));
            const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: edgeColor }));
            g.add(mesh); g.add(edges);
            return g;
        }

        // Player (a neon prism — pure primitive, no art asset)
        const player = neonBox(0.95, 1.15, 0.95, 0x00f0ff);
        player.position.set(LANES[1], 0.62, PLAYER_Z);
        scene.add(player);
        let playerX = LANES[1], targetLane = 1, currentLane = 1;

        // ---- scrolling floor rungs (speed cue) ----
        const rungs = [];
        const rungSpan = RECYCLE_Z - SPAWN_Z;
        for (let i = 0; i < RUNGS; i++) {
            const r = new THREE.Mesh(new THREE.BoxGeometry(6.2, 0.04, 0.12), new THREE.MeshBasicMaterial({ color: 0x1fa8ff }));
            r.position.set(0, 0.03, SPAWN_Z + (i / RUNGS) * rungSpan);
            scene.add(r); rungs.push(r);
        }

        // ---- side pillars (the tunnel columns, whipping past) ----
        const pillars = [];
        for (let i = 0; i < PILLARS; i++) {
            const side = (i % 2 === 0) ? -4.6 : 4.6;
            const p = neonBox(0.5, 5.5, 0.5, (i % 2 === 0) ? 0xff2bd6 : 0x00e0ff);
            p.position.set(side, 2.6, SPAWN_Z + (i / PILLARS) * rungSpan);
            scene.add(p); pillars.push(p);
        }

        // ---- object pools: obstacles (boxes) + orbs (spheres) ----
        const obstacles = [];
        for (let i = 0; i < OB_POOL; i++) {
            const o = neonBox(1.3, 1.4, 1.3, 0xff2bd6);
            o.visible = false; o.userData = { active: false, lane: 0, hit: false };
            scene.add(o); obstacles.push(o);
        }
        const orbs = [];
        for (let i = 0; i < ORB_POOL; i++) {
            const s = new THREE.Mesh(new THREE.SphereGeometry(0.42, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xffd24a, emissive: 0xffb000, emissiveIntensity: 0.9, roughness: 0.3 }));
            s.visible = false; s.userData = { active: false, lane: 0, hit: false };
            scene.add(s); orbs.push(s);
        }

        function getFree(pool) { return pool.find(o => !o.userData.active); }

        function spawnObstacle(lane) {
            const o = getFree(obstacles); if (!o) return;
            o.userData.active = true; o.userData.lane = lane; o.userData.hit = false;
            o.visible = true; o.position.set(LANES[lane], 0.72, SPAWN_Z);
        }
        function spawnOrb(lane) {
            const s = getFree(orbs); if (!s) return;
            s.userData.active = true; s.userData.lane = lane; s.userData.hit = false;
            s.visible = true; s.position.set(LANES[lane], 1.0, SPAWN_Z);
        }
        // Lane-safe wave: block 1-2 lanes (NEVER all 3); orb into a free lane.
        function spawnWave() {
            const order = [0, 1, 2].sort(() => Math.random() - 0.5);
            const blockCount = 1 + Math.floor(Math.random() * 2);
            const blocked = order.slice(0, blockCount);
            blocked.forEach(l => spawnObstacle(l));
            const free = [0, 1, 2].filter(l => blocked.indexOf(l) === -1);
            if (free.length && Math.random() < 0.6) spawnOrb(free[Math.floor(Math.random() * free.length)]);
        }

        // ============================ INPUT ============================
        function moveLane(dir) {
            const nt = Math.max(0, Math.min(2, targetLane + dir));
            if (nt !== targetLane) targetLane = nt;
        }
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') moveLane(-1);
            else if (e.code === 'ArrowRight') moveLane(1);
        });

        // ============================ STATE ============================
        let score = 0, invuln = 0, shake = 0, spawnTimer = 0;

        function damage() {
            if (invuln > 0) return;
            score = Math.max(0, score - 50);
            invuln = 1.0; shake = 0.35;
            const f = document.getElementById('hit-flash');
            f.style.opacity = '0.5'; setTimeout(() => f.style.opacity = '0', 90);
        }
        function collect(orb) {
            score += 50; orb.userData.active = false; orb.visible = false;
        }

        // report score to the FIT-ARCADE hub HUD
        setInterval(() => { if (window.MotionBridge) window.MotionBridge.reportScore(Math.floor(score)); }, 250);

        // ============================ LOOP ============================
        const clock = new THREE.Clock();
        function scroll(obj, dz) {
            obj.position.z += dz;
            if (obj.position.z > RECYCLE_Z) obj.position.z -= rungSpan; // wrap ambient geometry
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.05);
            const D = window.MOTION_DIFFICULTY || 1;
            const dz = BASE_SPEED * D * dt;

            score += dt * 10;                       // survival scoring
            if (invuln > 0) invuln -= dt;

            // ambient scroll (rungs + pillars loop forever)
            rungs.forEach(r => scroll(r, dz));
            pillars.forEach(p => scroll(p, dz));

            // player lane lerp + a little banking tilt
            playerX += (LANES[targetLane] - playerX) * Math.min(1, 12 * dt);
            player.position.x = playerX;
            player.rotation.z = (LANES[targetLane] - playerX) * 0.25;
            player.visible = !(invuln > 0 && Math.floor(invuln * 20) % 2 === 0); // blink while hit
            currentLane = Math.max(0, Math.min(2, Math.round((playerX + 2) / 2)));

            // obstacles + orbs: move toward camera, collide at the player plane, recycle
            for (const o of obstacles) {
                if (!o.userData.active) continue;
                o.position.z += dz;
                if (!o.userData.hit && o.position.z > PLAYER_Z - 0.9 && o.position.z < PLAYER_Z + 1.2 && o.userData.lane === currentLane) {
                    o.userData.hit = true; damage();
                }
                if (o.position.z > RECYCLE_Z) { o.userData.active = false; o.visible = false; }
            }
            for (const s of orbs) {
                if (!s.userData.active) continue;
                s.position.z += dz;
                s.rotation.y += dt * 3;
                if (!s.userData.hit && s.position.z > PLAYER_Z - 0.9 && s.position.z < PLAYER_Z + 1.2 && s.userData.lane === currentLane) {
                    s.userData.hit = true; collect(s);
                }
                if (s.position.z > RECYCLE_Z) { s.userData.active = false; s.visible = false; }
            }

            // spawn waves on a difficulty-scaled cadence
            spawnTimer -= dt;
            if (spawnTimer <= 0) { spawnWave(); spawnTimer = 0.95 / D; }

            // camera shake on hit
            if (shake > 0) { shake -= dt; camera.position.x = (Math.random() - 0.5) * shake * 1.2; }
            else camera.position.x = 0;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // verification hook (harmless; lets us inspect state headlessly)
        window.__hb3d = { scene, camera, obstacles, orbs, spawnWave, get score() { return score; }, get currentLane() { return currentLane; } };
    })();
    </script>
</body>
</html>
